- name: jinjapocalypse
  description: |
    Two-pass templating engine based on Jinja, with a twist on syntax and automatic image optimization. I'm using it to manage all of my static websites. 
  links: 
    - name: GitHub
      target: https://github.com/mortrevere/jinjapocalypse
- name: EnlargeYourFrench
  description: |
    A chat-based game where, given a list of definitions, you score when you are the first one to find the exact word.
    Very fun, supports both Discord and Mattermost. 
  links: 
    - name: GitHub
      target: https://github.com/mortrevere/EnlargeYourFrench
- name: yoko.cat
  description: |
    See pictures of my cat Yoko at any time of the day. Uses YOLO26 and a webcam pointed at its cat flap to send me notifications and display where he is (inside/outside).
  probe_url: https://yoko.cat/
  links: 
    - name: Website
      target: https://yoko.cat/
    - name: GitHub
      target: https://github.com/mortrevere/yoko.cat
