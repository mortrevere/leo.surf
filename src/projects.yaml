projects:
- name: beLow collective
  description: |
    A 6-person collective doing scenography, digital arts and a record label, which I co-founded in 2017. 
    Combining skills and passion from long-time friends as well as ones made along the way, which, over the years, has resulted in productions I am very proud of. 
  probe_url: https://below.black/
  links:
  - name: Website
    target: https://below.black/
  - name: GitHub
    target: https://github.com/mortrevere/below.black
